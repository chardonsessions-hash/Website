<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" role="img" aria-labelledby="title desc">
  <title id="title">THE SELKIE CEILIDH</title>
  <desc id="desc">Abstract dark cinematic Chardon Sessions placeholder artwork.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#11515a"/>
      <stop offset="0.48" stop-color="#06151c"/>
      <stop offset="1" stop-color="#050306"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="25%" r="60%">
      <stop offset="0" stop-color="#c51e63" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#c51e63" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.09"/></feComponentTransfer>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="1200" fill="url(#bg)"/>
  <rect width="900" height="1200" fill="url(#halo)"/>
  <path d="M0 925 C155 855 285 930 410 875 C555 812 665 870 900 780 L900 1200 L0 1200Z" fill="#050306" opacity="0.48"/>
  <circle cx="650" cy="210" r="92" fill="#fff7fb" opacity="0.88"/><circle cx="610" cy="190" r="92" fill="url(#bg)" opacity="0.94"/><path d="M80 875 C230 790,330 910,455 830 C590 745,720 875,850 790" fill="none" stroke="#41c8d2" stroke-width="9" opacity="0.55"/><path d="M365 330 C420 470,410 650,345 790" fill="none" stroke="#fff7fb" stroke-width="14" opacity="0.68"/><path d="M280 555 C380 590,510 590,610 545" fill="none" stroke="#f3cc86" stroke-width="8" opacity="0.45"/>
  <rect x="34" y="34" width="832" height="1132" rx="34" fill="none" stroke="#f3cc86" stroke-opacity="0.27" stroke-width="2"/>
  <text x="450" y="100" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" letter-spacing="6" fill="#f3cc86" opacity="0.85">CHARDON SESSIONS</text>
  <text x="450" y="1010" text-anchor="middle" font-family="Georgia, serif" font-size="64" font-weight="700" fill="#fff7fb" filter="url(#glow)"><tspan x="450" dy="0">THE SELKIE</tspan><tspan x="450" dy="76">CEILIDH</tspan></text>
  <text x="450" y="1130" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" letter-spacing="5" fill="#d8cad9" opacity="0.86">LOVE · LUNACY · LORE</text>
  <rect width="900" height="1200" filter="url(#grain)" opacity="0.55"/>
</svg>