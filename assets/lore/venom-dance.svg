<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" role="img" aria-labelledby="title desc">
  <title id="title">VENOM DANCE</title>
  <desc id="desc">Abstract dark cinematic Chardon Sessions placeholder artwork.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#274d2d"/>
      <stop offset="0.48" stop-color="#090b12"/>
      <stop offset="1" stop-color="#050306"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="25%" r="60%">
      <stop offset="0" stop-color="#8f5cff" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#8f5cff" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.09"/></feComponentTransfer>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="1200" fill="url(#bg)"/>
  <rect width="900" height="1200" fill="url(#halo)"/>
  <path d="M0 925 C155 855 285 930 410 875 C555 812 665 870 900 780 L900 1200 L0 1200Z" fill="#050306" opacity="0.48"/>
  <path d="M240 810 C520 720,280 550,560 465 C760 405,645 260,480 305" fill="none" stroke="#8f5cff" stroke-width="30" stroke-linecap="round" opacity="0.36"/><path d="M240 810 C520 720,280 550,560 465 C760 405,645 260,480 305" fill="none" stroke="#f3cc86" stroke-width="5" stroke-linecap="round" opacity="0.55"/><circle cx="480" cy="305" r="38" fill="#8f5cff" opacity="0.34"/>
  <rect x="34" y="34" width="832" height="1132" rx="34" fill="none" stroke="#f3cc86" stroke-opacity="0.27" stroke-width="2"/>
  <text x="450" y="100" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" letter-spacing="6" fill="#f3cc86" opacity="0.85">CHARDON SESSIONS</text>
  <text x="450" y="1010" text-anchor="middle" font-family="Georgia, serif" font-size="64" font-weight="700" fill="#fff7fb" filter="url(#glow)"><tspan x="450" dy="0">VENOM</tspan><tspan x="450" dy="76">DANCE</tspan></text>
  <text x="450" y="1130" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" letter-spacing="5" fill="#d8cad9" opacity="0.86">LOVE · LUNACY · LORE</text>
  <rect width="900" height="1200" filter="url(#grain)" opacity="0.55"/>
</svg>