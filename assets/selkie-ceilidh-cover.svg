<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1500" role="img" aria-labelledby="title desc">
  <title id="title">The Selkie Ceilidh cover art</title>
  <desc id="desc">A gothic ocean ballroom scene with moonlight, storm clouds, waves, and a dancing selkie silhouette.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#150b22"/>
      <stop offset="0.45" stop-color="#331233"/>
      <stop offset="1" stop-color="#05060c"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="20%" r="42%">
      <stop offset="0" stop-color="#f5dfb8" stop-opacity="0.95"/>
      <stop offset="0.18" stop-color="#f0c987" stop-opacity="0.5"/>
      <stop offset="0.42" stop-color="#4dc5cf" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wineGlow" cx="20%" cy="78%" r="55%">
      <stop offset="0" stop-color="#b8205a" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sea" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#07131c"/>
      <stop offset="0.5" stop-color="#123442"/>
      <stop offset="1" stop-color="#070912"/>
    </linearGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="1500" fill="url(#sky)"/>
  <rect width="1200" height="1500" fill="url(#moonGlow)"/>
  <rect width="1200" height="1500" fill="url(#wineGlow)"/>

