  <g opacity="0.9">
    <text x="600" y="1285" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="82" fill="#f6edf8" letter-spacing="-2">The Selkie Ceilidh</text>
    <text x="600" y="1354" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" fill="#f0c987" letter-spacing="8">CHARDON SESSIONS</text>
